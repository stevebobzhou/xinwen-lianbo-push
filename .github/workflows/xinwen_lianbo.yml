name: 新闻联播每日推送

on:
  schedule:
    # UTC时间12:00 = 北京时间20:00（新闻联播播出后）
    - cron: '0 12 * * *'
  workflow_dispatch:  # 支持手动触发测试

jobs:
  push-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run news crawler and push
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python xinwen_lianbo_push.py

      - name: Upload news files
        uses: actions/upload-artifact@v4
        with:
          name: xinwen_lianbo_${{ github.run_number }}
          path: |
            xinwen_lianbo_*.txt
            xinwen_lianbo_*.json
            xinwen_lianbo_*.md
          retention-days: 7
